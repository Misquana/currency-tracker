<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Курсы валют ЦБ РФ</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="header">
      <h1>Курсы валют ЦБ РФ</h1>
      <p class="header__subtitle">Данные с api.cbr-xml-daily.ru</p>
    </header>

    <main class="layout">
      <section class="card" aria-labelledby="rates-title">
        <h2 id="rates-title">Курсы на сегодня</h2>
        <div class="rates-table-wrapper">
          <table class="rates-table">
            <thead>
              <tr>
                <th>Код</th>
                <th>Валюта</th>
                <th>Курс, ₽</th>
                <th>Дата</th>
              </tr>
            </thead>
            <tbody id="rates-tbody">
              <tr>
                <td colspan="4" class="rates-table__placeholder">
                  Здесь будут курсы
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>

      <section class="card" aria-labelledby="history-title">
        <h2 id="history-title">История</h2>
        <div class="controls">
          <label class="controls__field">
            Валюта
            <select id="currency-select">
              <option value="USD">USD</option>
              <option value="EUR">EUR</option>
              <option value="CNY">CNY</option>
            </select>
          </label>
          <label class="controls__field">
            Период
            <select id="period-select">
              <option value="7">7 дней</option>
              <option value="30" selected>30 дней</option>
              <option value="90">90 дней</option>
            </select>
          </label>
        </div>
        <div class="chart-wrapper">
          <canvas id="rate-chart"></canvas>
          <p id="chart-placeholder" class="chart-placeholder">
            Здесь будет график
          </p>
        </div>
      </section>
    </main>

    <footer class="footer">
      <p>Practice project · 2026</p>
    </footer>

    <script src="/app.js" type="module"></script>
  </body>
</html>
